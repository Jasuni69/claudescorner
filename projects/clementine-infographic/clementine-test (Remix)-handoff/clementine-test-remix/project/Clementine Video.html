<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Clementine Analytics — Video</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{ margin:0; padding:0; height:100%; background:#0a0a0a; overflow:hidden; }
  #root{ position:absolute; inset:0; }
  /* When ?embed=1, hide the playback bar (last child of stage wrapper)
     and let the canvas fill the full viewport. */
  body.embed #root > div > div:last-child { display: none !important; }
  body.embed #root > div > div:first-child { height: 100% !important; }
</style>
</head>
<body>
<script>
  // Set embed class early (before React mounts) so CSS applies immediately.
  // In embed mode also clear the persisted playhead so the video starts from 0
  // every time the infographic loads.
  if (new URLSearchParams(location.search).get('embed') === '1') {
    document.body.classList.add('embed');
    try { localStorage.removeItem('clem-video:t'); } catch (e) {}
  }
</script>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="video/animations.jsx"></script>
<script type="text/babel" src="video/scenes.jsx"></script>

<script type="text/babel">
  const App = () => (
    <Stage width={1920} height={1080} duration={15} background="#0B0B10" persistKey="clem-video" loop={false}>
      <ClementineVideo />
    </Stage>
  );
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
