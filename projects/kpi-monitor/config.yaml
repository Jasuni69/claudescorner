# KPI Monitor Configuration
# Each KPI has a name, DAX query, threshold, direction, and optional workspace/dataset info.

workspace_id: "YOUR_WORKSPACE_ID"
dataset_id: "YOUR_DATASET_ID"

# Optional: MSAL auth (leave blank for interactive/device flow)
tenant_id: ""
client_id: ""

# Fabric Capacity Monitoring (separate workspace/dataset)
# Point to the "Fabric Capacity Metrics" app workspace.
# Capacity dataset is auto-provisioned; find its ID in the Fabric portal.
# DAX queries below target the CapacityUsageByArtifact table in that dataset.
capacity_workspace_id: "YOUR_CAPACITY_METRICS_WORKSPACE_ID"
capacity_dataset_id: "YOUR_CAPACITY_METRICS_DATASET_ID"

kpis:
  - name: "Daily Revenue"
    dax: "EVALUATE ROW(\"Value\", [Total Revenue])"
    threshold: 50000
    direction: above   # alert if value FALLS below threshold
    unit: "SEK"
    # spike_ignore_runs: 0  # alert on first breach (default)

  - name: "Open Invoices"
    dax: "EVALUATE ROW(\"Value\", COUNTROWS(Invoices))"
    threshold: 200
    direction: below   # alert if value RISES above threshold
    unit: "count"

  - name: "Gross Margin %"
    dax: "EVALUATE ROW(\"Value\", [Gross Margin %])"
    threshold: 0.30
    direction: above   # alert if falls below 30%
    unit: "%"

  - name: "Active Customers"
    dax: "EVALUATE ROW(\"Value\", DISTINCTCOUNT(Sales[CustomerID]))"
    threshold: 100
    direction: above
    unit: "count"

  # Example: SQL Analytics Endpoint CU spike — debounce 2 runs before alerting
  # Uncomment and set correct workspace/dataset IDs to enable.
  # - name: "SQL Endpoint CU% (Last Hour)"
  #   dax: |
  #     EVALUATE ROW("Value", [CU_Pct_Last_Hour])
  #   threshold: 80
  #   direction: below   # alert if rises above 80%
  #   unit: "%"
  #   spike_ignore_runs: 2  # suppress if breach clears within 2 runs (~2h if run hourly)

